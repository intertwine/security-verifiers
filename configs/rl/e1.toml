# Prime RL hosted training config for E1 (sv-env-network-logs)
# Launch: prime rl run configs/rl/e1.toml
# Or via make: make lab-run-e1

model = "Qwen/Qwen3-4B-Instruct-2507"
max_steps = 200
batch_size = 32
rollouts_per_example = 8
learning_rate = 1e-5
lora_alpha = 32

[sampling]
max_tokens = 2048
temperature = 0.7

[[env]]
id = "intertwine/sv-env-network-logs"
args = { split = "train", max_examples = 200 }

[wandb]
project = "svbench-e1"
entity = "intertwine"
name = "e1-grpo-lora-proof"

[eval]
interval = 50
num_examples = 50
rollouts_per_example = 1
eval_base_model = true

[[eval.env]]
id = "intertwine/sv-env-network-logs"
args = { split = "test" }
num_examples = 50
rollouts_per_example = 1

[checkpoints]
interval = 50
keep_cloud = 3

[buffer]
seed = 42
