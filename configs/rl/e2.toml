# Prime RL hosted training config for E2 (sv-env-config-verification)
# Launch: prime rl run configs/rl/e2.toml
# Or via make: make lab-run-e2

model = "Qwen/Qwen3-4B-Instruct-2507"
max_steps = 200
batch_size = 16
rollouts_per_example = 8
learning_rate = 1e-5
lora_alpha = 32

[sampling]
max_tokens = 4096
temperature = 0.7

[[env]]
id = "intertwine/sv-env-config-verification"
args = { split = "train", max_examples = 100 }

[wandb]
project = "svbench-e2"
entity = "intertwine"
name = "e2-grpo-lora-proof"

[eval]
interval = 50
num_examples = 30
rollouts_per_example = 1
eval_base_model = true

[[eval.env]]
id = "intertwine/sv-env-config-verification"
args = { split = "test" }
num_examples = 30
rollouts_per_example = 1

[checkpoints]
interval = 50
keep_cloud = 3

[buffer]
seed = 42
