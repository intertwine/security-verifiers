model = "Qwen/Qwen3-4B-Instruct-2507"
max_steps = 200
batch_size = 32
rollouts_per_example = 8
learning_rate = 1e-5
lora_alpha = 32
trainer = "grpo"
budget_group = "e1-v0.1-matched-budget"
reward_source = "llm_judge"
reward_config_id = "e1_llm_judge_reward"
judge_model = "gpt-4.1-nano"

[sampling]
max_tokens = 2048
temperature = 0.7

[dataset]
split = "train"
revision = "public-mini-v1"

[[env]]
id = "intertwine/sv-netlogs-judge"
args = { max_examples = 200, reward_source = "llm_judge", strict_schema = true }

[eval]
interval = 50
num_examples = 50
rollouts_per_example = 1
eval_base_model = true

[[eval.env]]
id = "intertwine/sv-netlogs-judge"
args = { max_examples = 50, reward_source = "llm_judge", strict_schema = true }

[buffer]
seed = 42
