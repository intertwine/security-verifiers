model = "Qwen/Qwen3-4B-Instruct-2507"
max_steps = 250
batch_size = 16
rollouts_per_example = 8
learning_rate = 8e-6
lora_alpha = 32
trainer = "grpo"
budget_group = "e2-v0.1-matched-budget"

[sampling]
max_tokens = 4096
temperature = 0.7

[tooling]
max_turns = 5
tool_budget = 3
timeout_per_tool_seconds = 30
timeout_per_episode_seconds = 120
allowed_tools = ["opa", "kube-linter", "semgrep"]
sandbox_mode = "local"
failure_handling = "zero_reward_and_record_error"

[dataset]
split = "train"
revision = "public-mini-v1"

[buffer]
seed = 42
