model = "Qwen/Qwen3.5-2B"
max_steps = 50
batch_size = 32
rollouts_per_example = 8
learning_rate = 1e-05
lora_alpha = 32
name = "svbench-e1-executable-pilot-svbench-research-claim-20260515T141203Z"

[sampling]
max_tokens = 2048
temperature = 0.7

[[env]]
id = "intertwine/sv-env-network-logs"
args = { max_examples = 50, reward_source = "executable" }

[eval]
interval = 50
num_examples = 25
rollouts_per_example = 1
eval_base_model = true
env = [{ id = "intertwine/sv-env-network-logs", args = { max_examples = 50 } }]

[buffer]
seed = 42
